<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Pie Chart of Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 80px);
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sync-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
        }
        .sync-status.online { color: #6bcb77; }
        .sync-status.offline { color: #ffd93d; }
        .sync-status.error { color: #e94560; }
        
        /* Current Location Card */
        .current-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .current-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .current-location {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .current-trip {
            font-size: 0.95rem;
            color: #a0a0a0;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .timer {
            font-size: 3rem;
            font-weight: 300;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: linear-gradient(90deg, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .timer-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        /* Quick Actions */
        .section-title {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .quick-locations {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .quick-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 10px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .quick-btn:hover, .quick-btn:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.98);
        }
        
        .quick-btn.current {
            background: rgba(107, 203, 119, 0.2);
            border-color: #6bcb77;
        }
        
        /* Search / Other Location */
        .search-container {
            margin-bottom: 25px;
        }
        
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        
        .search-input::placeholder {
            color: #666;
        }
        
        .search-input:focus {
            border-color: #667eea;
        }
        
        .search-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .search-result {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .search-result:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        /* Trip Description Input */
        .trip-input-container {
            margin-bottom: 25px;
            display: none;
        }
        
        .trip-input-container.show {
            display: block;
        }
        
        .trip-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 10px;
        }
        
        .trip-input::placeholder {
            color: #666;
        }
        
        .trip-btn {
            background: #667eea;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 20px;
            padding-bottom: calc(env(safe-area-inset-bottom, 15px) + 15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .nav-btn.active {
            color: #667eea;
        }
        
        .nav-icon {
            font-size: 1.5rem;
        }
        
        /* Pages */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* Stats Page */
        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-name {
            color: #ccc;
        }
        
        .stat-value {
            font-weight: 600;
            color: #6bcb77;
        }
        
        /* History Page */
        .history-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .history-location {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .history-time {
            font-size: 0.85rem;
            color: #888;
            margin-top: 3px;
        }
        
        .history-duration {
            font-size: 0.85rem;
            color: #6bcb77;
            margin-top: 3px;
        }
        
        .history-trip {
            font-size: 0.85rem;
            color: #667eea;
            font-style: italic;
            margin-top: 5px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* Confirmation Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 25px;
            max-width: 350px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal h3 {
            margin-bottom: 10px;
        }
        
        .modal p {
            color: #888;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .modal-btn.confirm {
            background: #667eea;
            color: #fff;
        }
        
        /* GPS Button */
        .gps-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid #667eea;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .gps-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HOME PAGE -->
        <div id="page-home" class="page active">
            <header>
                <h1>🥧 Pie Chart of Life</h1>
                <div id="sync-status" class="sync-status">Connecting...</div>
            </header>
            
            <div class="current-card">
                <div class="current-label">Currently In</div>
                <div id="current-location" class="current-location">Loading...</div>
                <div id="current-trip" class="current-trip"></div>
                <div id="timer" class="timer">--:--:--</div>
                <div class="timer-label">time in current location</div>
            </div>
            
            <button id="gps-btn" class="gps-btn">
                📍 Detect My Location
            </button>
            
            <div class="section-title">Quick Entry</div>
            <div class="quick-locations" id="quick-locations">
                <!-- Populated by JS -->
            </div>
            
            <div class="section-title">Other Location</div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Search states or countries...">
                <div class="search-results" id="search-results"></div>
            </div>
            
            <div class="trip-input-container" id="trip-input-container">
                <div class="section-title">Trip Description (Optional)</div>
                <input type="text" class="trip-input" id="trip-input" placeholder="e.g., Beach vacation, Work trip...">
                <button class="trip-btn" id="save-trip-btn">Update Trip Description</button>
            </div>
        </div>
        
        <!-- STATS PAGE -->
        <div id="page-stats" class="page">
            <header>
                <h1>📊 Stats</h1>
            </header>
            
            <div id="stats-content">
                <div class="loading">Loading stats...</div>
            </div>
        </div>
        
        <!-- HISTORY PAGE -->
        <div id="page-history" class="page">
            <header>
                <h1>📜 History</h1>
            </header>
            
            <div id="history-content">
                <div class="loading">Loading history...</div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-btn" data-page="stats">
            <span class="nav-icon">📊</span>
            <span>Stats</span>
        </button>
        <button class="nav-btn" data-page="history">
            <span class="nav-icon">📜</span>
            <span>History</span>
        </button>
    </div>
    
    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modal-title">Confirm Location</h3>
            <p id="modal-message">Switch to this location?</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn confirm" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxT_9e0KgXVQuMVcxuQcbFESCfbidCMpgrmnQXfI4JNnZwQorZXAcy-D8Vcqw5mgKAy/exec';
        
        // Your most frequent locations (customize this!)
        const QUICK_LOCATIONS = [
            'Washington DC',
            'Maryland',
            'Delaware',
            'New York',
            'Virginia',
            'California',
            'Flight',
            'Pennsylvania',
            'Mexico'
        ];
        
        // All US states and common countries
        const ALL_LOCATIONS = [
            // US States
            'Alabama', 'Alaska', 'Arizona', 'Arkansas', 'California', 'Colorado',
            'Connecticut', 'Delaware', 'Florida', 'Georgia', 'Hawaii', 'Idaho',
            'Illinois', 'Indiana', 'Iowa', 'Kansas', 'Kentucky', 'Louisiana',
            'Maine', 'Maryland', 'Massachusetts', 'Michigan', 'Minnesota',
            'Mississippi', 'Missouri', 'Montana', 'Nebraska', 'Nevada',
            'New Hampshire', 'New Jersey', 'New Mexico', 'New York',
            'North Carolina', 'North Dakota', 'Ohio', 'Oklahoma', 'Oregon',
            'Pennsylvania', 'Rhode Island', 'South Carolina', 'South Dakota',
            'Tennessee', 'Texas', 'Utah', 'Vermont', 'Virginia', 'Washington',
            'West Virginia', 'Wisconsin', 'Wyoming', 'Washington DC',
            // Special
            'Flight',
            // Countries
            'Canada', 'Mexico', 'United Kingdom', 'England', 'France', 'Germany',
            'Italy', 'Spain', 'Portugal', 'Netherlands', 'Belgium', 'Switzerland',
            'Austria', 'Australia', 'New Zealand', 'Japan', 'South Korea', 'China',
            'Thailand', 'Vietnam', 'Philippines', 'Indonesia', 'India', 'Brazil',
            'Argentina', 'Colombia', 'Peru', 'Chile', 'Costa Rica', 'Guatemala',
            'Puerto Rico', 'Aruba', 'The Bahamas', 'Jamaica', 'Dominican Republic',
            'Cuba', 'Ireland', 'Scotland', 'Greece', 'Turkey', 'Israel', 'Egypt',
            'Morocco', 'South Africa', 'Kenya', 'Iceland', 'Norway', 'Sweden',
            'Denmark', 'Finland', 'Poland', 'Czech Republic', 'Hungary', 'Croatia',
            'Monaco', 'Vatican City'
        ];
        
        // ============================================
        // STATE
        // ============================================
        let entries = [];
        let currentLocation = null;
        let currentStartTime = null;
        let timerInterval = null;
        let pendingLocation = null;
        let offlineQueue = [];
        
        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadOfflineQueue();
            initQuickLocations();
            initSearch();
            initNavigation();
            initModal();
            initGPS();
            initTripDescription();
            fetchData();
            
            // Refresh data periodically
            setInterval(fetchData, 60000);
        });
        
        // ============================================
        // DATA FETCHING
        // ============================================
        async function fetchData() {
            updateSyncStatus('syncing');
            
            try {
                // First, sync any offline entries
                await syncOfflineQueue();
                
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                if (result.success) {
                    entries = result.data.sort((a, b) => 
                        new Date(a.timestamp) - new Date(b.timestamp)
                    );
                    updateCurrentLocation();
                    updateSyncStatus('online');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                updateSyncStatus('offline');
                
                // Try to load from local storage
                const cached = localStorage.getItem('pie_chart_entries');
                if (cached) {
                    entries = JSON.parse(cached);
                    updateCurrentLocation();
                }
            }
            
            // Cache data locally
            localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
        }
        
        // ============================================
        // OFFLINE QUEUE
        // ============================================
        function loadOfflineQueue() {
            const saved = localStorage.getItem('pie_chart_offline_queue');
            if (saved) {
                offlineQueue = JSON.parse(saved);
            }
        }
        
        function saveOfflineQueue() {
            localStorage.setItem('pie_chart_offline_queue', JSON.stringify(offlineQueue));
        }
        
        async function syncOfflineQueue() {
            if (offlineQueue.length === 0) return;
            
            const queue = [...offlineQueue];
            offlineQueue = [];
            
            for (const entry of queue) {
                try {
                    await sendEntry(entry, false);
                } catch (error) {
                    offlineQueue.push(entry);
                }
            }
            
            saveOfflineQueue();
        }
        
        // ============================================
        // SENDING DATA
        // ============================================
        async function sendEntry(entryData, addToLocal = true) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(entryData)
            });
            
            const result = await response.json();
            
            if (!result.success) {
                throw new Error(result.error);
            }
            
            if (addToLocal) {
                entries.push(result.entry);
                localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
            }
            
            return result;
        }
        
        async function logLocation(location, tripDescription = '') {
            const entryData = {
                timestamp: new Date().toISOString(),
                location: location,
                trip_description: tripDescription,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            try {
                updateSyncStatus('syncing');
                await sendEntry(entryData);
                updateCurrentLocation();
                updateSyncStatus('online');
            } catch (error) {
                console.error('Failed to send, queuing offline:', error);
                offlineQueue.push(entryData);
                saveOfflineQueue();
                
                // Still update locally
                entries.push(entryData);
                localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
                updateCurrentLocation();
                updateSyncStatus('offline');
            }
        }
        
        // ============================================
        // UI UPDATES
        // ============================================
        function updateCurrentLocation() {
            if (entries.length === 0) {
                document.getElementById('current-location').textContent = 'No entries yet';
                document.getElementById('timer').textContent = '--:--:--';
                return;
            }
            
            const latest = entries[entries.length - 1];
            currentLocation = latest.location;
            currentStartTime = new Date(latest.timestamp);
            
            document.getElementById('current-location').textContent = currentLocation;
            
            const tripEl = document.getElementById('current-trip');
            if (latest.trip_description) {
                tripEl.textContent = latest.trip_description;
                tripEl.style.display = 'block';
            } else {
                tripEl.style.display = 'none';
            }
            
            // Update quick buttons to show current
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.classList.toggle('current', btn.dataset.location === currentLocation);
            });
            
            // Start timer
            updateTimer();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            // Show trip input
            document.getElementById('trip-input-container').classList.add('show');
            document.getElementById('trip-input').value = latest.trip_description || '';
        }
        
        function updateTimer() {
            if (!currentStartTime) return;
            
            const now = new Date();
            const diff = Math.floor((now - currentStartTime) / 1000);
            
            const days = Math.floor(diff / 86400);
            const hours = Math.floor((diff % 86400) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            
            let timerText;
            if (days > 0) {
                timerText = `${days}d ${hours}h ${minutes}m`;
            } else {
                timerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            document.getElementById('timer').textContent = timerText;
        }
        
        function updateSyncStatus(status) {
            const el = document.getElementById('sync-status');
            el.className = 'sync-status ' + status;
            
            const queueCount = offlineQueue.length;
            
            switch(status) {
                case 'online':
                    el.textContent = '● Synced';
                    break;
                case 'offline':
                    el.textContent = queueCount > 0 
                        ? `● Offline (${queueCount} pending)` 
                        : '● Offline';
                    break;
                case 'syncing':
                    el.textContent = '● Syncing...';
                    break;
                case 'error':
                    el.textContent = '● Error';
                    break;
            }
        }
        
        // ============================================
        // QUICK LOCATIONS
        // ============================================
        function initQuickLocations() {
            const container = document.getElementById('quick-locations');
            
            QUICK_LOCATIONS.forEach(location => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.dataset.location = location;
                btn.textContent = location;
                btn.addEventListener('click', () => showConfirmation(location));
                container.appendChild(btn);
            });
        }
        
        // ============================================
        // SEARCH
        // ============================================
        function initSearch() {
            const input = document.getElementById('search-input');
            const results = document.getElementById('search-results');
            
            input.addEventListener('input', () => {
                const query = input.value.toLowerCase().trim();
                
                if (query.length < 2) {
                    results.innerHTML = '';
                    return;
                }
                
                const matches = ALL_LOCATIONS.filter(loc => 
                    loc.toLowerCase().includes(query)
                ).slice(0, 5);
                
                results.innerHTML = matches.map(loc => `
                    <div class="search-result" data-location="${loc}">${loc}</div>
                `).join('');
                
                results.querySelectorAll('.search-result').forEach(el => {
                    el.addEventListener('click', () => {
                        showConfirmation(el.dataset.location);
                        input.value = '';
                        results.innerHTML = '';
                    });
                });
            });
        }
        
        // ============================================
        // MODAL
        // ============================================
        function initModal() {
            document.getElementById('modal-cancel').addEventListener('click', hideModal);
            document.getElementById('modal-confirm').addEventListener('click', confirmLocation);
        }
        
        function showConfirmation(location) {
            if (location === currentLocation) {
                // Already here, no need to log
                return;
            }
            
            pendingLocation = location;
            document.getElementById('modal-title').textContent = `Switch to ${location}?`;
            document.getElementById('modal-message').textContent = 
                `This will end your time in ${currentLocation || 'current location'} and start tracking ${location}.`;
            document.getElementById('modal').classList.add('show');
        }
        
        function hideModal() {
            document.getElementById('modal').classList.remove('show');
            pendingLocation = null;
        }
        
        function confirmLocation() {
            if (pendingLocation) {
                logLocation(pendingLocation);
                hideModal();
            }
        }
        
        // ============================================
        // GPS
        // ============================================
        function initGPS() {
            const btn = document.getElementById('gps-btn');
            
            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = '📍 Detecting...';
                
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000
                        });
                    });
                    
                    const { latitude, longitude } = position.coords;
                    
                    // Use reverse geocoding to get location name
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
                    );
                    const data = await response.json();
                    
                    let detectedLocation = null;
                    
                    // Try to get state (US) or country
                    if (data.address) {
                        if (data.address.state && data.address.country_code === 'us') {
                            detectedLocation = data.address.state;
                            // Handle DC specially
                            if (detectedLocation === 'District of Columbia') {
                                detectedLocation = 'Washington DC';
                            }
                        } else if (data.address.country) {
                            detectedLocation = data.address.country;
                        }
                    }
                    
                    if (detectedLocation) {
                        showConfirmation(detectedLocation);
                    } else {
                        alert('Could not determine location. Please select manually.');
                    }
                    
                } catch (error) {
                    console.error('GPS error:', error);
                    alert('Could not get location. Please make sure GPS is enabled.');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '📍 Detect My Location';
                }
            });
        }
        
        // ============================================
        // TRIP DESCRIPTION
        // ============================================
        function initTripDescription() {
            const btn = document.getElementById('save-trip-btn');
            const input = document.getElementById('trip-input');
            
            btn.addEventListener('click', async () => {
                if (entries.length === 0) return;
                
                const latest = entries[entries.length - 1];
                latest.trip_description = input.value;
                
                // Update locally
                localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
                
                // Update UI
                const tripEl = document.getElementById('current-trip');
                if (input.value) {
                    tripEl.textContent = input.value;
                    tripEl.style.display = 'block';
                } else {
                    tripEl.style.display = 'none';
                }
                
                btn.textContent = 'Saved!';
                setTimeout(() => {
                    btn.textContent = 'Update Trip Description';
                }, 1500);
                
                // Note: To actually update the Google Sheet, we'd need an update endpoint
                // For now, trip descriptions for existing entries are stored locally
            });
        }
        
        // ============================================
        // NAVIGATION
        // ============================================
        function initNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    
                    // Update nav buttons
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update pages
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(`page-${page}`).classList.add('active');
                    
                    // Load page content
                    if (page === 'stats') loadStats();
                    if (page === 'history') loadHistory();
                });
            });
        }
        
        // ============================================
        // STATS PAGE
        // ============================================
        function loadStats() {
            const container = document.getElementById('stats-content');
            
            if (entries.length === 0) {
                container.innerHTML = '<div class="loading">No data yet</div>';
                return;
            }
            
            // Calculate stats
            const locationTotals = {};
            let totalSeconds = 0;
            
            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                const start = new Date(entry.timestamp);
                const end = i < entries.length - 1 
                    ? new Date(entries[i + 1].timestamp)
                    : new Date();
                
                const duration = (end - start) / 1000;
                
                if (!locationTotals[entry.location]) {
                    locationTotals[entry.location] = 0;
                }
                locationTotals[entry.location] += duration;
                totalSeconds += duration;
            }
            
            // Sort by total time
            const sorted = Object.entries(locationTotals)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            // Format duration
            function formatDuration(seconds) {
                const days = Math.floor(seconds / 86400);
                const hours = Math.floor((seconds % 86400) / 3600);
                
                if (days > 0) {
                    return `${days}d ${hours}h`;
                }
                const minutes = Math.floor((seconds % 3600) / 60);
                return `${hours}h ${minutes}m`;
            }
            
            container.innerHTML = `
                <div class="stat-card">
                    <div class="section-title">Top Locations</div>
                    ${sorted.map(([location, seconds]) => `
                        <div class="stat-row">
                            <span class="stat-name">${location}</span>
                            <span class="stat-value">${formatDuration(seconds)}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="stat-card">
                    <div class="section-title">Overview</div>
                    <div class="stat-row">
                        <span class="stat-name">Total Entries</span>
                        <span class="stat-value">${entries.length}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Unique Locations</span>
                        <span class="stat-value">${Object.keys(locationTotals).length}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Total Time Tracked</span>
                        <span class="stat-value">${formatDuration(totalSeconds)}</span>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // HISTORY PAGE
        // ============================================
        function loadHistory() {
            const container = document.getElementById('history-content');
            
            if (entries.length === 0) {
                container.innerHTML = '<div class="loading">No entries yet</div>';
                return;
            }
            
            // Show recent entries (most recent first)
            const recent = [...entries].reverse().slice(0, 50);
            
            function formatDate(timestamp) {
                const date = new Date(timestamp);
                return date.toLocaleDateString('en-US', {
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit'
                });
            }
            
            function getDuration(entry, index) {
                const actualIndex = entries.length - 1 - index;
                const start = new Date(entry.timestamp);
                const end = actualIndex < entries.length - 1
                    ? new Date(entries[actualIndex + 1].timestamp)
                    : new Date();
                
                const seconds = (end - start) / 1000;
                const days = Math.floor(seconds / 86400);
                const hours = Math.floor((seconds % 86400) / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                
                if (days > 0) return `${days}d ${hours}h`;
                if (hours > 0) return `${hours}h ${minutes}m`;
                return `${minutes}m`;
            }
            
            container.innerHTML = recent.map((entry, index) => `
                <div class="history-item">
                    <div class="history-location">${entry.location}</div>
                    <div class="history-time">${formatDate(entry.timestamp)}</div>
                    <div class="history-duration">Duration: ${getDuration(entry, index)}</div>
                    ${entry.trip_description ? `<div class="history-trip">${entry.trip_description}</div>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
