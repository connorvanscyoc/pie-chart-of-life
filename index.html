<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Pie Chart of Life</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 80px);
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sync-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sync-status.online { color: #6bcb77; }
        .sync-status.offline { color: #ffd93d; }
        
        .refresh-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .current-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .current-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .current-location {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .current-trip-container {
            margin-bottom: 15px;
        }
        
        .current-trip {
            font-size: 0.95rem;
            color: #a0a0a0;
            font-style: italic;
            cursor: pointer;
            padding: 5px 0;
        }
        
        .current-trip:hover {
            color: #667eea;
        }
        
        .current-trip-edit {
            display: none;
        }
        
        .current-trip-edit.show {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .trip-edit-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        
        .trip-edit-btn {
            background: #667eea;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .trip-edit-cancel {
            background: rgba(255,255,255,0.1);
        }
        
        .timer {
            font-size: 3rem;
            font-weight: 300;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: linear-gradient(90deg, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .timer-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        .section-title {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .quick-locations {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .quick-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 10px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .quick-btn:hover, .quick-btn:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.98);
        }
        
        .quick-btn.current {
            background: rgba(107, 203, 119, 0.2);
            border-color: #6bcb77;
        }
        
        .search-container {
            margin-bottom: 25px;
        }
        
        .search-input, .control-select, .control-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        
        .search-input::placeholder, .control-input::placeholder {
            color: #666;
        }
        
        .search-input:focus, .control-select:focus, .control-input:focus {
            border-color: #667eea;
        }
        
        .search-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .search-result {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .search-result:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 20px;
            padding-bottom: calc(env(safe-area-inset-bottom, 15px) + 15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .nav-btn.active {
            color: #667eea;
        }
        
        .nav-icon {
            font-size: 1.5rem;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* Stats Page Styles */
        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-name {
            color: #ccc;
        }
        
        .stat-value {
            font-weight: 600;
            color: #6bcb77;
        }
        
        .chart-container {
            position: relative;
            height: 280px;
            margin: 15px 0;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .control-group {
            flex: 1;
            min-width: 120px;
        }
        
        .control-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
            display: block;
        }
        
        .control-select, .control-input {
            padding: 10px 12px;
            font-size: 0.9rem;
            width: 100%;
        }
        
        .tab-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .tab-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-color: transparent;
            color: #fff;
        }
        
        .date-range-controls {
            display: none;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .date-range-controls.show {
            display: flex;
        }
        
        .location-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .location-toggle {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #888;
            transition: all 0.2s;
        }
        
        .location-toggle.active {
            color: #fff;
            border-color: currentColor;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .summary-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .summary-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }
        
        /* History Page */
        .history-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .history-location {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .history-time {
            font-size: 0.85rem;
            color: #888;
            margin-top: 3px;
        }
        
        .history-duration {
            font-size: 0.85rem;
            color: #6bcb77;
            margin-top: 3px;
        }
        
        .history-trip {
            font-size: 0.85rem;
            color: #667eea;
            font-style: italic;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 25px;
            max-width: 350px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal h3 {
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .modal-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }
        
        .modal-hint {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }
        
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .modal-btn.confirm {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: #fff;
        }
        
        .gps-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid #667eea;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .gps-btn:disabled {
            opacity: 0.5;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HOME PAGE -->
        <div id="page-home" class="page active">
            <header>
                <h1>🥧 Pie Chart of Life</h1>
                <div id="sync-status" class="sync-status">
                    <span id="sync-text">Connecting...</span>
                    <button class="refresh-btn" id="refresh-btn" title="Refresh">🔄</button>
                </div>
            </header>
            
            <div class="current-card">
                <div class="current-label">Currently In</div>
                <div id="current-location" class="current-location">Loading...</div>
                
                <div class="current-trip-container">
                    <div id="current-trip" class="current-trip" title="Click to edit"></div>
                    <div id="current-trip-edit" class="current-trip-edit">
                        <input type="text" class="trip-edit-input" id="trip-edit-input" placeholder="Trip description...">
                        <button class="trip-edit-btn" id="trip-save-btn">Save</button>
                        <button class="trip-edit-btn trip-edit-cancel" id="trip-cancel-btn">✕</button>
                    </div>
                </div>
                
                <div id="timer" class="timer">--:--:--</div>
                <div class="timer-label">time in current location</div>
            </div>
            
            <button id="gps-btn" class="gps-btn">
                📍 Detect My Location
            </button>
            
            <div class="section-title">Quick Entry</div>
            <div class="quick-locations" id="quick-locations"></div>
            
            <div class="section-title">Other Location</div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Search states or countries...">
                <div class="search-results" id="search-results"></div>
            </div>
        </div>
        
        <!-- STATS PAGE -->
        <div id="page-stats" class="page">
            <header>
                <h1>📊 Stats</h1>
            </header>
            
            <div id="stats-content">
                <!-- Summary Cards -->
                <div class="summary-grid" id="summary-grid"></div>
                
                <!-- Chart Type Tabs -->
                <div class="tab-bar" id="chart-tabs">
                    <button class="tab-btn active" data-chart="pie">🥧 Pie</button>
                    <button class="tab-btn" data-chart="trends">📈 Trends</button>
                    <button class="tab-btn" data-chart="year">📅 By Year</button>
                </div>
                
                <!-- Time Range Controls -->
                <div class="controls" id="time-controls">
                    <div class="control-group">
                        <label class="control-label">Time Range</label>
                        <select class="control-select" id="time-range-select">
                            <option value="all">All Time</option>
                            <option value="year">Specific Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                    </div>
                    <div class="control-group" id="year-select-group" style="display:none;">
                        <label class="control-label">Year</label>
                        <select class="control-select" id="year-select"></select>
                    </div>
                </div>
                
                <!-- Custom Date Range -->
                <div class="date-range-controls" id="date-range-controls">
                    <div class="control-group">
                        <label class="control-label">From</label>
                        <input type="date" class="control-input" id="date-from">
                    </div>
                    <div class="control-group">
                        <label class="control-label">To</label>
                        <input type="date" class="control-input" id="date-to">
                    </div>
                </div>
                
                <!-- Location Toggles (for trends chart) -->
                <div class="location-toggles" id="location-toggles" style="display:none;"></div>
                
                <!-- Chart Container -->
                <div class="stat-card">
                    <div class="chart-container">
                        <canvas id="stats-chart"></canvas>
                    </div>
                </div>
                
                <!-- Top Locations Table -->
                <div class="stat-card" id="top-locations-card">
                    <div class="section-title">Top Locations</div>
                    <div id="top-locations-list"></div>
                </div>
            </div>
        </div>
        
        <!-- HISTORY PAGE -->
        <div id="page-history" class="page">
            <header>
                <h1>📜 History</h1>
            </header>
            <div id="history-content">
                <div class="loading">Loading history...</div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-btn" data-page="stats">
            <span class="nav-icon">📊</span>
            <span>Stats</span>
        </button>
        <button class="nav-btn" data-page="history">
            <span class="nav-icon">📜</span>
            <span>History</span>
        </button>
    </div>
    
    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modal-title">📍 New Location</h3>
            <input type="text" class="modal-input" id="modal-trip-input" placeholder="Trip description (optional)">
            <div class="modal-hint">e.g., "Beach vacation", "Work trip", "Visiting family"</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn confirm" id="modal-confirm">Log Entry</button>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxT_9e0KgXVQuMVcxuQcbFESCfbidCMpgrmnQXfI4JNnZwQorZXAcy-D8Vcqw5mgKAy/exec';
        
        const QUICK_LOCATIONS = [
            'Washington DC', 'Maryland', 'Delaware', 'New York', 'Virginia',
            'California', 'Flight', 'Pennsylvania', 'Mexico'
        ];
        
        const ALL_LOCATIONS = [
            'Alabama', 'Alaska', 'Arizona', 'Arkansas', 'California', 'Colorado',
            'Connecticut', 'Delaware', 'Florida', 'Georgia', 'Hawaii', 'Idaho',
            'Illinois', 'Indiana', 'Iowa', 'Kansas', 'Kentucky', 'Louisiana',
            'Maine', 'Maryland', 'Massachusetts', 'Michigan', 'Minnesota',
            'Mississippi', 'Missouri', 'Montana', 'Nebraska', 'Nevada',
            'New Hampshire', 'New Jersey', 'New Mexico', 'New York',
            'North Carolina', 'North Dakota', 'Ohio', 'Oklahoma', 'Oregon',
            'Pennsylvania', 'Rhode Island', 'South Carolina', 'South Dakota',
            'Tennessee', 'Texas', 'Utah', 'Vermont', 'Virginia', 'Washington',
            'West Virginia', 'Wisconsin', 'Wyoming', 'Washington DC', 'Flight',
            'Canada', 'Mexico', 'United Kingdom', 'England', 'France', 'Germany',
            'Italy', 'Spain', 'Portugal', 'Netherlands', 'Belgium', 'Switzerland',
            'Austria', 'Australia', 'New Zealand', 'Japan', 'South Korea', 'China',
            'Thailand', 'Vietnam', 'Philippines', 'Indonesia', 'India', 'Brazil',
            'Argentina', 'Colombia', 'Peru', 'Chile', 'Costa Rica', 'Guatemala',
            'Puerto Rico', 'Aruba', 'The Bahamas', 'Jamaica', 'Dominican Republic',
            'Cuba', 'Ireland', 'Scotland', 'Greece', 'Turkey', 'Israel', 'Egypt',
            'Morocco', 'South Africa', 'Kenya', 'Iceland', 'Norway', 'Sweden',
            'Denmark', 'Finland', 'Poland', 'Czech Republic', 'Hungary', 'Croatia',
            'Monaco', 'Vatican City'
        ];
        
        const CHART_COLORS = [
            '#e94560', '#4d96ff', '#ffd93d', '#6bcb77', '#ff9f43', '#a855f7',
            '#06b6d4', '#f43f5e', '#84cc16', '#8b5cf6', '#ec4899', '#14b8a6',
            '#f97316', '#6366f1', '#22c55e', '#eab308'
        ];
        
        const KEY_LOCATIONS = ['Maryland', 'Washington DC', 'New York', 'Delaware', 'California', 'Mexico'];
        
        // ============================================
        // STATE
        // ============================================
        let entries = [];
        let currentEntry = null;
        let currentStartTime = null;
        let timerInterval = null;
        let pendingLocation = null;
        let offlineQueue = [];
        let timeOffset = 0;
        let statsChart = null;
        let activeChartType = 'pie';
        let selectedLocations = ['Maryland', 'Washington DC', 'New York', 'Delaware', 'California', 'Mexico'];
        
        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadOfflineQueue();
            initQuickLocations();
            initSearch();
            initNavigation();
            initModal();
            initGPS();
            initTripEdit();
            initRefresh();
            initStatsControls();
            fetchData();
            setInterval(fetchData, 30000);
        });
        
        // ============================================
        // TIME FUNCTIONS
        // ============================================
        function getAccurateNow() {
            return new Date(Date.now() + timeOffset);
        }
        
        // ============================================
        // DATA FETCHING
        // ============================================
        async function fetchData() {
            updateSyncStatus('syncing');
            
            try {
                await syncOfflineQueue();
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                if (result.success) {
                    entries = result.data.sort((a, b) => 
                        new Date(a.timestamp) - new Date(b.timestamp)
                    );
                    
                    if (result.serverTime) {
                        const serverTime = new Date(result.serverTime).getTime();
                        timeOffset = serverTime - Date.now();
                    }
                    
                    updateCurrentLocation();
                    updateSyncStatus('online');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                updateSyncStatus('offline');
                
                const cached = localStorage.getItem('pie_chart_entries');
                if (cached) {
                    entries = JSON.parse(cached);
                    updateCurrentLocation();
                }
            }
            
            localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
        }
        
        function initRefresh() {
            document.getElementById('refresh-btn').addEventListener('click', fetchData);
        }
        
        // ============================================
        // OFFLINE QUEUE
        // ============================================
        function loadOfflineQueue() {
            const saved = localStorage.getItem('pie_chart_offline_queue');
            if (saved) offlineQueue = JSON.parse(saved);
        }
        
        function saveOfflineQueue() {
            localStorage.setItem('pie_chart_offline_queue', JSON.stringify(offlineQueue));
        }
        
        async function syncOfflineQueue() {
            if (offlineQueue.length === 0) return;
            const queue = [...offlineQueue];
            offlineQueue = [];
            
            for (const entry of queue) {
                try {
                    await sendEntry(entry, false);
                } catch (error) {
                    offlineQueue.push(entry);
                }
            }
            saveOfflineQueue();
        }
        
        // ============================================
        // SENDING DATA
        // ============================================
        async function sendEntry(entryData, addToLocal = true) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(entryData)
            });
            const result = await response.json();
            if (!result.success) throw new Error(result.error);
            
            if (addToLocal) {
                entries.push(result.entry);
                localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
            }
            return result;
        }
        
        async function logLocation(location, tripDescription = '') {
            const entryData = {
                location: location,
                trip_description: tripDescription,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            try {
                updateSyncStatus('syncing');
                const result = await sendEntry(entryData);
                currentEntry = result.entry;
                updateCurrentLocation();
                updateSyncStatus('online');
            } catch (error) {
                entryData.timestamp = new Date().toISOString();
                offlineQueue.push(entryData);
                saveOfflineQueue();
                entries.push(entryData);
                localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
                updateCurrentLocation();
                updateSyncStatus('offline');
            }
        }
        
        async function updateTripDescription(row, tripDescription) {
            try {
                const url = `${SCRIPT_URL}?action=update&row=${row}&trip_description=${encodeURIComponent(tripDescription)}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    const entry = entries.find(e => e.row === row);
                    if (entry) {
                        entry.trip_description = tripDescription;
                        localStorage.setItem('pie_chart_entries', JSON.stringify(entries));
                    }
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }
        
        // ============================================
        // TRIP EDIT UI
        // ============================================
        function initTripEdit() {
            const tripDisplay = document.getElementById('current-trip');
            const tripEdit = document.getElementById('current-trip-edit');
            const tripInput = document.getElementById('trip-edit-input');
            const saveBtn = document.getElementById('trip-save-btn');
            const cancelBtn = document.getElementById('trip-cancel-btn');
            
            tripDisplay.addEventListener('click', () => {
                if (!currentEntry) return;
                tripInput.value = currentEntry.trip_description || '';
                tripDisplay.style.display = 'none';
                tripEdit.classList.add('show');
                tripInput.focus();
            });
            
            saveBtn.addEventListener('click', async () => {
                if (!currentEntry || !currentEntry.row) return;
                const newTrip = tripInput.value.trim();
                saveBtn.textContent = '...';
                const success = await updateTripDescription(currentEntry.row, newTrip);
                if (success) {
                    currentEntry.trip_description = newTrip;
                    updateTripDisplay();
                }
                saveBtn.textContent = 'Save';
                tripEdit.classList.remove('show');
                tripDisplay.style.display = 'block';
            });
            
            cancelBtn.addEventListener('click', () => {
                tripEdit.classList.remove('show');
                tripDisplay.style.display = 'block';
            });
            
            tripInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveBtn.click();
            });
        }
        
        function updateTripDisplay() {
            const tripEl = document.getElementById('current-trip');
            if (currentEntry && currentEntry.trip_description) {
                tripEl.textContent = currentEntry.trip_description;
            } else {
                tripEl.textContent = '+ Add trip description';
            }
            tripEl.style.display = 'block';
        }
        
        // ============================================
        // UI UPDATES
        // ============================================
        function updateCurrentLocation() {
            if (entries.length === 0) {
                document.getElementById('current-location').textContent = 'No entries yet';
                document.getElementById('timer').textContent = '--:--:--';
                document.getElementById('current-trip').style.display = 'none';
                return;
            }
            
            currentEntry = entries[entries.length - 1];
            currentStartTime = new Date(currentEntry.timestamp);
            
            document.getElementById('current-location').textContent = currentEntry.location;
            updateTripDisplay();
            
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.classList.toggle('current', btn.dataset.location === currentEntry.location);
            });
            
            updateTimer();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function updateTimer() {
            if (!currentStartTime) return;
            
            const now = getAccurateNow();
            const diff = Math.max(0, Math.floor((now - currentStartTime) / 1000));
            
            const days = Math.floor(diff / 86400);
            const hours = Math.floor((diff % 86400) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            
            document.getElementById('timer').textContent = days > 0
                ? `${days}d ${hours}h ${minutes}m`
                : `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function updateSyncStatus(status) {
            const el = document.getElementById('sync-text');
            document.getElementById('sync-status').className = 'sync-status ' + status;
            
            switch(status) {
                case 'online': el.textContent = '● Synced'; break;
                case 'offline': el.textContent = offlineQueue.length > 0 ? `● Offline (${offlineQueue.length} pending)` : '● Offline'; break;
                case 'syncing': el.textContent = '● Syncing...'; break;
            }
        }
        
        // ============================================
        // QUICK LOCATIONS & SEARCH
        // ============================================
        function initQuickLocations() {
            const container = document.getElementById('quick-locations');
            QUICK_LOCATIONS.forEach(location => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.dataset.location = location;
                btn.textContent = location;
                btn.addEventListener('click', () => showConfirmation(location));
                container.appendChild(btn);
            });
        }
        
        function initSearch() {
            const input = document.getElementById('search-input');
            const results = document.getElementById('search-results');
            
            input.addEventListener('input', () => {
                const query = input.value.toLowerCase().trim();
                if (query.length < 2) { results.innerHTML = ''; return; }
                
                const matches = ALL_LOCATIONS.filter(loc => 
                    loc.toLowerCase().includes(query)
                ).slice(0, 5);
                
                results.innerHTML = matches.map(loc => 
                    `<div class="search-result" data-location="${loc}">${loc}</div>`
                ).join('');
                
                results.querySelectorAll('.search-result').forEach(el => {
                    el.addEventListener('click', () => {
                        showConfirmation(el.dataset.location);
                        input.value = '';
                        results.innerHTML = '';
                    });
                });
            });
        }
        
        // ============================================
        // MODAL
        // ============================================
        function initModal() {
            document.getElementById('modal-cancel').addEventListener('click', hideModal);
            document.getElementById('modal-confirm').addEventListener('click', confirmLocation);
            document.getElementById('modal-trip-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') confirmLocation();
            });
        }
        
        function showConfirmation(location) {
            if (currentEntry && location === currentEntry.location) return;
            pendingLocation = location;
            document.getElementById('modal-title').textContent = `📍 ${location}`;
            document.getElementById('modal-trip-input').value = '';
            document.getElementById('modal').classList.add('show');
            setTimeout(() => document.getElementById('modal-trip-input').focus(), 100);
        }
        
        function hideModal() {
            document.getElementById('modal').classList.remove('show');
            pendingLocation = null;
        }
        
        function confirmLocation() {
            if (pendingLocation) {
                logLocation(pendingLocation, document.getElementById('modal-trip-input').value.trim());
                hideModal();
            }
        }
        
        // ============================================
        // GPS
        // ============================================
        function initGPS() {
            const btn = document.getElementById('gps-btn');
            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = '📍 Detecting...';
                
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true, timeout: 10000
                        });
                    });
                    
                    const { latitude, longitude } = position.coords;
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
                    );
                    const data = await response.json();
                    
                    let detectedLocation = null;
                    if (data.address) {
                        if (data.address.state && data.address.country_code === 'us') {
                            detectedLocation = data.address.state === 'District of Columbia' 
                                ? 'Washington DC' : data.address.state;
                        } else if (data.address.country) {
                            detectedLocation = data.address.country;
                        }
                    }
                    
                    if (detectedLocation) showConfirmation(detectedLocation);
                    else alert('Could not determine location.');
                } catch (error) {
                    alert('Could not get location.');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '📍 Detect My Location';
                }
            });
        }
        
        // ============================================
        // NAVIGATION
        // ============================================
        function initNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(`page-${page}`).classList.add('active');
                    
                    if (page === 'stats') loadStats();
                    if (page === 'history') loadHistory();
                });
            });
        }
        
        // ============================================
        // STATS PAGE
        // ============================================
        function initStatsControls() {
            // Chart type tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeChartType = btn.dataset.chart;
                    updateStatsUI();
                    renderChart();
                });
            });
            
            // Time range select
            document.getElementById('time-range-select').addEventListener('change', (e) => {
                const value = e.target.value;
                document.getElementById('year-select-group').style.display = value === 'year' ? 'block' : 'none';
                document.getElementById('date-range-controls').classList.toggle('show', value === 'custom');
                renderChart();
            });
            
            // Year select
            document.getElementById('year-select').addEventListener('change', renderChart);
            
            // Date range inputs
            document.getElementById('date-from').addEventListener('change', renderChart);
            document.getElementById('date-to').addEventListener('change', renderChart);
        }
        
        function updateStatsUI() {
            const showTrends = activeChartType === 'trends';
            document.getElementById('location-toggles').style.display = showTrends ? 'flex' : 'none';
            document.getElementById('time-controls').style.display = activeChartType === 'trends' ? 'none' : 'flex';
            document.getElementById('top-locations-card').style.display = activeChartType === 'pie' ? 'block' : 'none';
        }
        
        function loadStats() {
            if (entries.length === 0) return;
            
            // Populate year selector
            const years = [...new Set(entries.map(e => new Date(e.timestamp).getFullYear()))].sort((a, b) => b - a);
            const yearSelect = document.getElementById('year-select');
            yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
            
            // Set default date range
            const firstDate = new Date(entries[0].timestamp);
            const lastDate = getAccurateNow();
            document.getElementById('date-from').value = firstDate.toISOString().split('T')[0];
            document.getElementById('date-to').value = lastDate.toISOString().split('T')[0];
            
            // Populate location toggles for trends
            populateLocationToggles();
            
            // Update summary
            updateSummary();
            
            // Render chart
            updateStatsUI();
            renderChart();
        }
        
        function populateLocationToggles() {
            const container = document.getElementById('location-toggles');
            container.innerHTML = '';
            
            KEY_LOCATIONS.forEach((loc, i) => {
                const toggle = document.createElement('button');
                toggle.className = 'location-toggle' + (selectedLocations.includes(loc) ? ' active' : '');
                toggle.textContent = loc;
                toggle.style.color = CHART_COLORS[i];
                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('active');
                    if (selectedLocations.includes(loc)) {
                        selectedLocations = selectedLocations.filter(l => l !== loc);
                    } else {
                        selectedLocations.push(loc);
                    }
                    renderChart();
                });
                container.appendChild(toggle);
            });
        }
        
        function updateSummary() {
            const totalDays = (getAccurateNow() - new Date(entries[0].timestamp)) / (1000 * 60 * 60 * 24);
            const uniqueLocations = new Set(entries.map(e => e.location)).size;
            
            document.getElementById('summary-grid').innerHTML = `
                <div class="summary-item">
                    <div class="summary-value">${Math.floor(totalDays / 365)}</div>
                    <div class="summary-label">Years Tracked</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value">${entries.length.toLocaleString()}</div>
                    <div class="summary-label">Total Entries</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value">${uniqueLocations}</div>
                    <div class="summary-label">Unique Locations</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value">${Math.floor(totalDays).toLocaleString()}</div>
                    <div class="summary-label">Days Alive</div>
                </div>
            `;
        }
        
        function getFilteredEntries() {
            const timeRange = document.getElementById('time-range-select').value;
            let startDate, endDate;
            
            if (timeRange === 'all') {
                return entries;
            } else if (timeRange === 'year') {
                const year = parseInt(document.getElementById('year-select').value);
                startDate = new Date(year, 0, 1);
                endDate = new Date(year + 1, 0, 1);
            } else if (timeRange === 'custom') {
                startDate = new Date(document.getElementById('date-from').value);
                endDate = new Date(document.getElementById('date-to').value);
                endDate.setDate(endDate.getDate() + 1);
            }
            
            return entries.filter(e => {
                const date = new Date(e.timestamp);
                return date >= startDate && date < endDate;
            });
        }
        
        function calculateLocationTotals(filteredEntries, startDate, endDate) {
            const totals = {};
            
            for (let i = 0; i < filteredEntries.length; i++) {
                const entry = filteredEntries[i];
                const entryStart = new Date(entry.timestamp);
                
                // Find the end time for this entry
                let entryEnd;
                if (i < filteredEntries.length - 1) {
                    entryEnd = new Date(filteredEntries[i + 1].timestamp);
                } else {
                    entryEnd = getAccurateNow();
                }
                
                // Clamp to the filter range if needed
                const effectiveStart = startDate ? Math.max(entryStart, startDate) : entryStart;
                const effectiveEnd = endDate ? Math.min(entryEnd, endDate) : entryEnd;
                
                const duration = Math.max(0, (effectiveEnd - effectiveStart) / 1000);
                
                if (!totals[entry.location]) totals[entry.location] = 0;
                totals[entry.location] += duration;
            }
            
            return totals;
        }
        
        function renderChart() {
            if (entries.length === 0) return;
            
            const ctx = document.getElementById('stats-chart').getContext('2d');
            if (statsChart) statsChart.destroy();
            
            if (activeChartType === 'pie') {
                renderPieChart(ctx);
            } else if (activeChartType === 'trends') {
                renderTrendsChart(ctx);
            } else if (activeChartType === 'year') {
                renderYearChart(ctx);
            }
        }
        
        function renderPieChart(ctx) {
            const filteredEntries = getFilteredEntries();
            if (filteredEntries.length === 0) return;
            
            const timeRange = document.getElementById('time-range-select').value;
            let startDate, endDate;
            
            if (timeRange === 'year') {
                const year = parseInt(document.getElementById('year-select').value);
                startDate = new Date(year, 0, 1);
                endDate = new Date(year + 1, 0, 1);
            } else if (timeRange === 'custom') {
                startDate = new Date(document.getElementById('date-from').value);
                endDate = new Date(document.getElementById('date-to').value);
            }
            
            const totals = calculateLocationTotals(filteredEntries, startDate, endDate);
            const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
            
            // Top 10 + Others
            const top10 = sorted.slice(0, 10);
            const othersTotal = sorted.slice(10).reduce((sum, [_, val]) => sum + val, 0);
            
            const labels = top10.map(([loc]) => loc);
            const data = top10.map(([_, val]) => val / 86400);
            
            if (othersTotal > 0) {
                labels.push('Others');
                data.push(othersTotal / 86400);
            }
            
            statsChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: CHART_COLORS.slice(0, labels.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#fff', padding: 10, font: { size: 11 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const days = ctx.raw.toFixed(1);
                                    const pct = ((ctx.raw / data.reduce((a, b) => a + b, 0)) * 100).toFixed(1);
                                    return `${ctx.label}: ${days} days (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });
            
            // Update top locations list
            const listEl = document.getElementById('top-locations-list');
            listEl.innerHTML = sorted.slice(0, 10).map(([loc, secs]) => {
                const days = (secs / 86400).toFixed(1);
                const pct = ((secs / Object.values(totals).reduce((a, b) => a + b, 0)) * 100).toFixed(1);
                return `<div class="stat-row">
                    <span class="stat-name">${loc}</span>
                    <span class="stat-value">${days}d (${pct}%)</span>
                </div>`;
            }).join('');
        }
        
        function renderTrendsChart(ctx) {
            // Get all years
            const years = [...new Set(entries.map(e => new Date(e.timestamp).getFullYear()))].sort();
            
            // Calculate totals by year and location
            const yearlyData = {};
            years.forEach(year => {
                const yearStart = new Date(year, 0, 1);
                const yearEnd = new Date(year + 1, 0, 1);
                const yearEntries = entries.filter(e => {
                    const d = new Date(e.timestamp);
                    return d >= yearStart && d < yearEnd;
                });
                
                yearlyData[year] = calculateLocationTotals(yearEntries, yearStart, yearEnd);
            });
            
            // Build datasets for selected locations
            const datasets = selectedLocations.map((loc, i) => ({
                label: loc,
                data: years.map(year => (yearlyData[year][loc] || 0) / 86400),
                borderColor: CHART_COLORS[i],
                backgroundColor: CHART_COLORS[i] + '20',
                tension: 0.3,
                pointRadius: 3,
                borderWidth: 2
            }));
            
            statsChart = new Chart(ctx, {
                type: 'line',
                data: { labels: years, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)} days`
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#888' } },
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#888' }, title: { display: true, text: 'Days', color: '#888' } }
                    }
                }
            });
        }
        
        function renderYearChart(ctx) {
            const timeRange = document.getElementById('time-range-select').value;
            let year;
            
            if (timeRange === 'year') {
                year = parseInt(document.getElementById('year-select').value);
            } else {
                year = new Date().getFullYear();
            }
            
            const yearStart = new Date(year, 0, 1);
            const yearEnd = new Date(year + 1, 0, 1);
            
            const yearEntries = entries.filter(e => {
                const d = new Date(e.timestamp);
                return d >= yearStart && d < yearEnd;
            });
            
            if (yearEntries.length === 0) {
                statsChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: [], datasets: [{ data: [] }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                return;
            }
            
            const totals = calculateLocationTotals(yearEntries, yearStart, yearEnd);
            const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]).slice(0, 15);
            
            statsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(([loc]) => loc),
                    datasets: [{
                        data: sorted.map(([_, val]) => val / 86400),
                        backgroundColor: CHART_COLORS,
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.raw.toFixed(1)} days`
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#888' } },
                        y: { grid: { display: false }, ticks: { color: '#fff', font: { size: 11 } } }
                    }
                }
            });
        }
        
        // ============================================
        // HISTORY PAGE
        // ============================================
        function loadHistory() {
            const container = document.getElementById('history-content');
            if (entries.length === 0) {
                container.innerHTML = '<div class="loading">No entries yet</div>';
                return;
            }
            
            const recent = [...entries].reverse().slice(0, 50);
            
            container.innerHTML = recent.map((entry, index) => {
                const date = new Date(entry.timestamp);
                const dateStr = date.toLocaleDateString('en-US', {
                    weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
                });
                
                const actualIndex = entries.length - 1 - index;
                const start = new Date(entry.timestamp);
                const end = actualIndex < entries.length - 1 ? new Date(entries[actualIndex + 1].timestamp) : getAccurateNow();
                const seconds = (end - start) / 1000;
                const days = Math.floor(seconds / 86400);
                const hours = Math.floor((seconds % 86400) / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const duration = days > 0 ? `${days}d ${hours}h` : hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
                
                return `<div class="history-item">
                    <div class="history-location">${entry.location}</div>
                    <div class="history-time">${dateStr}</div>
                    <div class="history-duration">Duration: ${duration}</div>
                    ${entry.trip_description ? `<div class="history-trip">${entry.trip_description}</div>` : ''}
                </div>`;
            }).join('');
        }
    </script>
